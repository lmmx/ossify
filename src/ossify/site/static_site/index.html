<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ossify</title>

  <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700..900&family=Space+Grotesk:wght@500;700&family=Inter+Tight:wght@400;500;600&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <h1>ossify</h1>
    <p class="subtitle"><em>o</em>pen <em>s</em>ource <em>s</em>oftware <em>i</em>ntelligence <em>f</em>or <em>y</em>ou</p>

    <a class="gh-link" href="#" target="_blank">ossify repo</a>
  </header>

  <section class="filters">
    <div id="stats"></div>
    <label><input type="checkbox" id="hide-archived" checked> hide archived</label>
    <label><input type="checkbox" id="hide-ok"> hide OK</label>
    <label><input type="checkbox" id="only-failing"> only failing</label>
    <label><input type="checkbox" id="only-priority"> only priority</label>
  </section>

  <div id="table"></div>

  <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
